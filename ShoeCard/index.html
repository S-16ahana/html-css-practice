<body>

  <div class="card">
    <div class="card-header">
      <div class="logo">adidas</div>
      <div class="cart">👜</div>
    </div>

    <div class="product-img">
      <img src="https://i.imgur.com/2nCt3Sbl.png" alt="Shoe">
    </div>

    <div class="title">ADDIDAS GAZE ZX</div>
    <div class="desc">
      Lorem ipsum dolor sit lorem i amet, consectetur adipiscing elit.
    </div>

    <div class="stars">★★★★☆</div>

    <div class="row">
      <div class="colors">
        <span>Colour:</span>
        <div class="color blue active"></div>
        <div class="color pink"></div>
        <div class="color yellow"></div>
      </div>

      <div class="price">
        <h3>$09.00</h3>
        <p>Nine dollar only</p>
      </div>
    </div>

    <button class="btn">Add To Cart</button>
  </div>
