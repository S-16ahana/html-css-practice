<!DOCTYPE html>
<html>
<head>
    <title>Testimonial Slider</title>
    <link rel="stylesheet" href="testimonial.css">
</head>
<body>

<div class="slider-container">

    <div class="testimonial active">
        <img src="https://i.pravatar.cc/100?img=1">
        <h3>Sarah Thompson</h3>
        <p class="role">Happy Customer</p>
        <p class="message">
            "This product has changed my life! The quality is exceptional."
        </p>
    </div>

    <div class="testimonial">
        <img src="https://i.pravatar.cc/100?img=2">
        <h3>John Miller</h3>
        <p class="role">Client</p>
        <p class="message">
            "Amazing service and fast support. Highly recommended!"
        </p>
    </div>

    <div class="testimonial">
        <img src="https://i.pravatar.cc/100?img=3">
        <h3>Emily Davis</h3>
        <p class="role">User</p>
        <p class="message">
            "Very professional and easy to use interface."
        </p>
    </div>

    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>

</div>

<script src="script.js"></script>
</body>
</html>
